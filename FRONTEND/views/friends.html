<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
    <title>Cinexus - Friends</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/style/style.css" />
</head>
<body class="page-friends">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand nav-link" onclick="window.location.href='home.html'">🎬 Cinexus</span>
    <div class="navbar-user-group">
        <div id="navAvatar" class="avatar nav-avatar is-clickable" onclick="window.location.href='user_profile.html'" title="View profile">JD</div>
        <button class="btn btn-outline-light" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container friends-container py-5">

    <h2 class="text-white mb-4">Friends</h2>

    <ul class="tabs">
        <li class="active" onclick="mostrarTab('buscar')">Find Users</li>
        <li onclick="mostrarTab('solicitudes')">Requests <span id="contadorSolicitudes" class="badge requests-badge ms-1"></span></li>
        <li onclick="mostrarTab('amigos')">My Friends</li>
    </ul>

    <div id="tab-buscar">
        <div class="d-flex gap-2 mb-4">
            <input id="inputBusqueda" type="text" class="form-control" placeholder="Search by name...">
            <button class="btn btn-morado" onclick="buscarUsuarios()">Search</button>
        </div>
        <div id="resultadosBusqueda" class="d-flex flex-column gap-3"></div>
    </div>

    <div id="tab-solicitudes" class="d-none">
        <div id="listaSolicitudes" class="d-flex flex-column gap-3"></div>
    </div>

    <div id="tab-amigos" class="d-none">
        <div id="listaAmigos" class="d-flex flex-column gap-3"></div>
    </div>

</div>

<footer class="text-center py-3"><small>&copy; 2026 Cinexus - All rights reserved</small></footer>

<script src="../controllers/api.js"></script>
<script src="../controllers/friendController.js"></script>
<script>
requireAuth();
const usuario = JSON.parse(localStorage.getItem('user')) || {};
document.getElementById('navAvatar').textContent = getInitials(usuario.name);

function tarjetaUsuario(u, boton) {
    return `
    <div class="tarjeta-usuario d-flex align-items-center gap-3">
        <div class="avatar">${getInitials(u.name)}</div>
        <div class="flex-grow-1">
            <strong class="text-white">${u.name}</strong>
            <p class="text-secondary user-bio mb-0">${u.bio || ''}</p>
        </div>
        ${boton}
    </div>`;
}

function mostrarTab(tab) {
    ['buscar', 'solicitudes', 'amigos'].forEach(t =>
        document.getElementById('tab-' + t).classList.toggle('d-none', t !== tab)
    );
    document.querySelectorAll('.tabs li').forEach((li, i) =>
        li.classList.toggle('active', ['buscar', 'solicitudes', 'amigos'][i] === tab)
    );
    if (tab === 'solicitudes') mostrarSolicitudes();
    if (tab === 'amigos') mostrarAmigos();
}

loadFriendsData();
mostrarSolicitudes();
buscarUsuarios();
</script>
</body>
</html>
