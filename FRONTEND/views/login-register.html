<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
    <title>Cinexus - Login</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/style/style.css" />
</head>
<body class="page-login">

<div class="container d-flex justify-content-center align-items-center h-100">
    <div class="card auth-card p-4 shadow">

        <!-- LOGIN FORM -->
        <div id="loginForm">
            <h3 class="text-center mb-3">login</h3>

            <input type="email" class="form-control mb-3" placeholder="Email">
            <input type="password" class="form-control mb-3" placeholder="Password">

            <button class="btn btn-primary w-100 mb-3" onclick="login()">Enter</button>

            <p class="text-center">¿Don't have an account? 
                <span class="toggle-link" onclick="toggleForms()">Register</span>
            </p>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerForm" class="is-hidden">
            <h3 class="text-center mb-3">Create Account</h3>

            <input type="text" class="form-control mb-2" placeholder="Name">
            <input type="email" class="form-control mb-2" placeholder="Email">
            <input type="password" class="form-control mb-2" placeholder="Password">
            <input type="password" class="form-control mb-3" placeholder="Confirm Password">

            <button class="btn btn-primary w-100 mb-3" onclick="register()">Register</button>

            <p class="text-center">¿Already have an account? 
                <span class="toggle-link" onclick="toggleForms()">Login</span>
            </p>
        </div>

    </div>
</div>

<script>
function toggleForms(){
    document.getElementById('loginForm').classList.toggle('is-hidden');
    document.getElementById('registerForm').classList.toggle('is-hidden');
}

function login(){
    localStorage.setItem('user', JSON.stringify({name: 'Jhon Doe'}));
    window.location.href = 'home.html';
}

function register(){
    alert('Usuario registrado (fake)');
    toggleForms();
}
</script>

</body>
<footer class="text-center py-3">
    <small>&copy; 2026 Cinexus - All rights reserved</small>
</footer>
</html>
